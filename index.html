<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>摄影师人格测试</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--card:#1a1a1a;--accent:#ff6b35;--text:#fff;--muted:#666}
body{font-family:-apple-system,BinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:20px}
h1{text-align:center;margin:20px 0;font-size:28px}
.card{background:var(--card);border-radius:16px;padding:24px;margin-bottom:20px}
.progress{text-align:center;color:var(--muted);margin-bottom:16px}
.question{font-size:18px;margin-bottom:20px;line-height:1.6}
.options{display:flex;flex-direction:column;gap:12px}
.option{background:#252525;padding:16px;border-radius:12px;cursor:pointer;border:2px solid transparent}
.option:hover{border-color:var(--accent)}
.option.selected{background:var(--accent)}
.btn{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer}
.btn:disabled{background:#444;cursor:not-allowed}
.btns{display:flex;gap:10px}
.btns button{flex:1}
</style>
</head>
<body>
<div class="container">
<h1>摄影师人格测试</h1>
<div id="quiz">
<div class="card">
<div class="progress">问题 <span id="c">1</span> / 24</div>
<div class="question" id="q"></div>
<div class="options" id="o"></div>
</div>
<div class="btns">
<button class="btn" onclick="prev()" style="background:#444">上一题</button>
<button class="btn" id="b" onclick="next()">下一题</button>
</div>
</div>
</div>
<script>
var qs=[],ts=[],a=[],idx=0;
load();
function load(){
fetch('data/questions.json').then(r=>r.json()).then(function(d){qs=d;loadTypes()})
}
function loadTypes(){
fetch('data/types.json').then(r=>r.json()).then(function(d){ts=d;render()})
}
function render(){
if(qs.length==0||ts.length==0)return;
document.getElementById('c').innerText=idx+1;
document.getElementById('q').innerText=qs[idx].question;
var el=document.getElementById('o');
el.innerHTML='';
var opts=qs[idx].options;
for(var j=0;j<opts.length;j++){
var div=document.createElement('div');
div.className='option'+(a[idx]===j?' selected':'');
div.innerText=opts[j].text||opts[j];
div.onclick=function(){a[idx]=j;render()};
el.appendChild(div);
}
document.getElementById('b').disabled=a[idx]===undefined;
document.getElementById('b').innerText=idx<23?'下一题':'看结果';
}
function prev(){if(idx>0){idx--;render()}}
function next(){if(idx<23){idx++;render()}else{show()}}
function show(){
var sc={};
for(var i=0;i<a.length;i++){
if(a[i]!==undefined){
var opt=qs[i].options[a[i]];
if(opt&&opt.scoreType){
sc[opt.scoreType]=(sc[opt.scoreType]||0)+1;
}
}
}
var best=0,res=ts[0];
for(var k in sc){
if(sc[k]>best){best=sc[k];res=ts.find(function(t){return t.shortDesc===k})||ts[0]}
}
document.getElementById('quiz').innerHTML='<div class="card result"><h2 style="color:var(--accent)">'+res.name+'</h2><p>'+res.fullDesc+'</p><div style="background:#ffeaa7;color:#333;padding:16px;border-radius:4px;margin:16px 0">'+(res.diary||'')+'</div><div style="background:#252525;padding:16px;border-radius:12px;margin:16px 0;border:1px solid var(--accent)"><div style="color:var(--accent)">'+res.camera+'</div><div style="color:var(--muted);font-style:italic">'+res.cameraRoast+'</div></div><button class="btn" onclick="location.reload()">再测一次</button></div>';
}
</script>
</body>
</html>
