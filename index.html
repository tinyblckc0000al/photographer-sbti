<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>摄影师人格测试</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--card:#1a1a1a;--accent:#ff6b35;--text:#fff;--muted:#666}
body{font-family:-apple-system,BinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:20px}
h1{text-align:center;margin:20px 0;font-size:28px}
.card{background:var(--card);border-radius:16px;padding:24px;margin-bottom:20px}
.progress{text-align:center;color:var(--muted);margin-bottom:16px}
.question{font-size:18px;margin-bottom:20px;line-height:1.6}
.options{display:flex;flex-direction:column;gap:12px}
.option{background:#252525;padding:16px;border-radius:12px;cursor:pointer;border:2px solid transparent}
.option:hover{border-color:var(--accent)}
.option.selected{background:var(--accent)}
.btn{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer}
.btn:disabled{background:#444;cursor:not-allowed}
.result{text-align:center}
.result h2{color:var(--accent);font-size:24px;margin:16px 0}
.result p{color:var(--muted);line-height:1.6;margin:16px 0}
.diary{background:#ffeaa7;color:#333;padding:16px;border-radius:4px;margin:16px 0;transform:rotate(-1deg)}
.cam{background:#252525;padding:16px;border-radius:12px;margin:16px 0;border:1px solid var(--accent)}
.cam-name{color:var(--accent);font-size:18px}
.cam-roast{color:var(--muted);font-style:italic;font-size:14px}
.icon{width:80px;height:80px;margin:0 auto 16px}
</style>
</head>
<body>
<div class="container">
<h1>摄影师人格测试</h1>
<div id="quiz">
<div class="card">
<div class="progress">问题 <span id="c">1</span> / 24</div>
<div class="question" id="q"></div>
<div class="options" id="o"></div>
</div>
<button class="btn" onclick="prev()" style="margin-right:10px;background:#444">上一题</button>
<button class="btn" id="b" onclick="next()">下一题</button>
</div>
<div id="r" style="display:none" class="result"></div>
</div>
<script>
let qs=[],ts={},a=[],i=0;
fetch('data/questions.json').then(r=>r.json()).then(d=>{qs=d;loadTypes()});
function loadTypes(){
fetch('data/types.json').then(r=>r.json()).then(d=>{d.forEach(t=>ts[t.id]=t);render()})
}
function render(){
if(!qs.length)return;
document.getElementById('c').innerText=i+1;
document.getElementById('q').innerText=qs[i].question;
let o=document.getElementById('o');
o.innerHTML='';
(qs[i].options||[]).forEach((opt,j)=>{
let div=document.createElement('div');
div.className='option'+(a[i]===j?' selected':'');
div.innerText=opt.text||opt;
div.onclick=()=>{a[i]=j;render()};
o.appendChild(div);
});
document.getElementById('b').disabled=a[i]===undefined;
document.getElementById('b').innerText=i<23?'下一题':'看结果';
}
function prev(){if(i>0){i--;render()}}
function next(){if(i<23){i++;render()}else show()}
function show(){
let s={};
Object.keys(ts).forEach(k=>s[k]=0);
a.forEach((ans,qid)=>{
let opt=qs[qid].options[ans];
if(opt&&opt.scoreType)s[opt.scoreType]=(s[opt.scoreType]||0)+1;
});
let max=0,res=ts[1];
Object.keys(s).forEach(t=>{if(s[t]>max){max=s[t];res=ts[t]}});
document.getElementById('quiz').style.display='none';
let r=document.getElementById('r');
r.style.display='block';
r.innerHTML=`<div class="card">
<img class="icon" src="icons/${String(res.id).padStart(2,'0')}.svg">
<h2>${res.name}</h2>
<p>${res.fullDesc}</p>
<div class="diary">${res.diary||'咔嚓'}</div>
<div class="cam">
<div class="cam-name">${res.camera}</div>
<div class="cam-roast">${res.cameraRoast}</div>
</div>
<button class="btn" onclick="location.reload()">再测一次</button>
</div>`;
}
</script>
</body>
</html>
