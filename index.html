<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>摄影师人格测试 SBTI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--card:#1a1a1a;--accent:#ff6b35;--text:#fff;--muted:#666}
body{font-family:-apple-system,B BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:20px}
h1{text-align:center;margin:20px 0;font-size:28px}
/* Tab */
.tab{display:flex;gap:10px;margin-bottom:20px}
.tab button{flex:1;padding:14px;background:var(--card);border:2px solid var(--accent);color:var(--text);border-radius:12px;font-size:16px;cursor:pointer}
.tab button.active{background:var(--accent)}
/* Card */
.card{background:var(--card);border-radius:16px;padding:24px;margin-bottom:20px}
/* Progress */
.progress{text-align:center;color:var(--muted);margin-bottom:16px}
/* Options */
.options{display:flex;flex-direction:column;gap:12px}
.option{background:#252525;padding:16px;border-radius:12px;cursor:pointer;border:2px solid transparent}
.option:hover{border-color:var(--accent)}
.option.selected{background:var(--accent)}
/* Button */
.btn{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer}
.btn:disabled{background:var(--muted);cursor:not-allowed}
/* Result */
.result-card{text-align:center}
.result-type{font-size:24px;color:var(--accent);margin:16px 0}
.result-desc{color:var(--muted);line-height:1.6;margin:16px 0}
/* Diary style */
.diary{background:#ffeaa7;color:#333;padding:16px;border-radius:4px;margin:16px 0;transform:rotate(-2deg);box-shadow:2px 2px 4px rgba(0,0,0,0.3)}
.camera-box{background:#252525;padding:16px;border-radius:12px;margin:16px 0;border:1px solid var(--accent)}
.camera-name{color:var(--accent);font-size:18px}
.camera-roast{color:var(--muted);font-style:italic;font-size:14px}
/* SVG icon */
.type-icon{width:80px;height:80px;margin:0 auto;display:block}
</style>
</head>
<body>
<div class="container">
<h1>📷 摄影师人格测试</h1>
<div class="tab">
<button class="active" onclick="switchTab('test')">人格测试</button>
<button onclick="switchTab('roast')">恶搞答题</button>
</div>
<div id="quiz">
<div class="card">
<div class="progress">问题 <span id="cur">1</span> / <span id="tot">24</span></div>
<div class="question" id="question"></div>
<div class="options" id="options"></div>
</div>
<button class="btn" id="nextBtn" onclick="nextQ()" disabled>下一题</button>
</div>
<div id="result" style="display:none"></div>
</div>
<script>
const questions=[],types={};
// Load data from data files
fetch('data/questions.json').then(r=>r.json()).then(d=>{questions.push(...d);loadTypes()})
function loadTypes(){
fetch('data/types.json').then(r=>r.json()).then(d=>{d.forEach(t=>types[t.id]=t);renderQ()})
}
// Also load beginner types - merge after load
let current=0,answers=[],mode='test';
function switchTab(m){mode=m;current=0;answers=[];renderQ()}
function renderQ(){
if(!questions.length)return;
document.getElementById('cur').textContent=current+1;
document.getElementById('tot').textContent=questions.length;
const q=questions[current];
document.getElementById('question').textContent=q.question;
const opts=document.getElementById('options');
opts.innerHTML='';
(q.options||[]).forEach((o,i)=>{
const div=document.createElement('div');
div.className='option'+(answers[current]===i?' selected':'');
div.textContent=o.text||o;
div.onclick=()=>selectOpt(i);
opts.appendChild(div);
});
document.getElementById('nextBtn').disabled=answers[current]===undefined;
document.getElementById('nextBtn').textContent=current<questions.length-1?'下一题':'看结果';
}
function selectOpt(i){answers[current]=i;renderQ()}
function nextQ(){if(current<questions.length-1){current++;renderQ()}else showResult()}
function showResult(){
const scores={};
Object.keys(types).forEach(k=>scores[k]=0);
answers.forEach((a,qid)=>{
if(questions[qid].options&&questions[qid].options[a]){
const o=questions[qid].options[a];
const st=o.scoreType||o.type||'keyboards';
scores[st]=(scores[st]||0)+(o.scoreValue||1);
}
});
let max=0,result=types[1];
Object.keys(scores).forEach(t=>{if(scores[t]>max){max=scores[t];result=types[t]}});
document.getElementById('quiz').style.display='none';
const r=document.getElementById('result');
r.style.display='block';
r.innerHTML=`<div class="card result-card">
<img class="type-icon" src="icons/${String(result.id).padStart(2,'0')}.svg" alt="${result.name}">
<div class="result-type">${result.name}</div>
<div class="result-desc">${result.fullDesc||result.description}</div>
<div class="diary">${result.diary||'咔嚓！'}</div>
<div class="camera-box">
<div class="camera-name">📷 ${result.camera}</div>
<div class="camera-roast">"${result.cameraRoast}"</div>
</div>
<button class="btn" onclick="location.reload()">再测一次</button>
</div>`;
}
renderQ();
</script>
</body>
</html>
